name: Weekly GSC audit

# Runs scripts/gsc_audit.py on a schedule and commits the resulting
# reports/gsc-audit-YYYY-MM-DD.md back to main.
#
# Cadence: Mondays at 06:00 UTC. The routine-data-pipeline (separate repo)
# runs Sundays 04:00 UTC, so by Monday morning the GSC snapshot tables in
# .agents/context/gsc-snapshot.md are fresh. Running the audit afterward
# lines its data window up with the snapshot's.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write GSC service account credential
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
        run: |
          if [ -z "$GSC_SA_JSON" ]; then
            echo "::error::GSC_SA_JSON secret is empty"
            exit 1
          fi
          printf '%s' "$GSC_SA_JSON" > .gsc-service-account.json
          # Sanity-check it's valid JSON
          python -c "import json; json.load(open('.gsc-service-account.json'))"

      - name: Run audit
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: python scripts/gsc_audit.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/gsc-audit-*.md
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore(seo): weekly GSC audit $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Remove credential file
        if: always()
        run: rm -f .gsc-service-account.json

      - name: Upload report on failure (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-audit-debug-${{ github.run_id }}
          path: reports/
          retention-days: 7
